<style>
  :root{
    --paper:#f6f2e9;
    --ink:#2b2620;
    --navy:#22344a;
    --navy-2:#3a5170;
    --gold:#b8860b;
    --card:#fffdf8;
    --line:#d9d0bd;
    --green:#3f7d5c;
    --red:#a8442f;
    --muted:#8a8171;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; padding:0; background:var(--paper); color:var(--ink);
    font-family: "Georgia", "Times New Roman", serif;
    min-height:100vh;
    padding-top:env(safe-area-inset-top);
    padding-bottom:env(safe-area-inset-bottom);
    -webkit-tap-highlight-color: transparent;
  }
  .wrap{max-width:640px; margin:0 auto; padding:18px 16px 60px;}
  header{
    display:flex; justify-content:space-between; align-items:baseline;
    border-bottom:2px solid var(--navy); padding-bottom:10px; margin-bottom:16px;
  }
  header h1{font-size:20px; margin:0; letter-spacing:.5px; color:var(--navy);}
  header .day-badge{
    font-family:"Helvetica Neue",Arial,sans-serif; font-size:12px; color:var(--gold);
    border:1px solid var(--gold); border-radius:20px; padding:3px 10px;
  }
  nav.tabs{display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap;}
  nav.tabs button{
    font-family:"Helvetica Neue",Arial,sans-serif; font-size:13px;
    background:none; border:1px solid var(--line); color:var(--navy-2);
    padding:7px 12px; border-radius:6px; cursor:pointer;
  }
  nav.tabs button.active{background:var(--navy); color:#fff; border-color:var(--navy);}
  .panel{display:none;}
  .panel.active{display:block;}

  .stat-row{display:flex; gap:10px; margin-bottom:16px;}
  .stat{
    flex:1; background:var(--card); border:1px solid var(--line); border-radius:8px;
    padding:10px 8px; text-align:center; font-family:"Helvetica Neue",Arial,sans-serif;
  }
  .stat b{display:block; font-size:22px; color:var(--navy); font-family:Georgia,serif;}
  .stat span{font-size:11px; color:var(--muted);}

  .card{
    background:var(--card); border:1px solid var(--line); border-radius:10px;
    padding:26px 20px; text-align:center; min-height:180px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    cursor:pointer; box-shadow: 0 2px 0 var(--line); margin-bottom:14px;
    position:relative;
  }
  .card .word{font-size:30px; color:var(--navy); font-weight:bold;}
  .card .pos{font-size:13px; color:var(--gold); margin-top:4px; font-style:italic;}
  .pron-row{display:flex; align-items:center; justify-content:center; gap:8px; margin-top:6px;}
  .ipa{font-family:"Helvetica Neue",Arial,sans-serif; font-size:14px; color:var(--navy-2);}
  .play-btn{
    width:28px; height:28px; border-radius:50%; border:1px solid var(--navy-2);
    background:#fff; color:var(--navy-2); cursor:pointer; font-size:13px;
    display:flex; align-items:center; justify-content:center; line-height:1;
  }
  .play-btn:hover{background:var(--navy-2); color:#fff;}
  .card .def{font-size:18px; margin-top:14px;}
  .card .ex{font-size:14px; color:var(--muted); margin-top:12px; line-height:1.5; text-align:left;}
  .card .ex-label{font-size:10px; text-transform:uppercase; letter-spacing:.04em; color:var(--gold); display:block; margin-bottom:2px;}
  .card .hint{
    position:absolute; bottom:8px; right:12px; font-size:11px; color:var(--muted);
    font-family:"Helvetica Neue",Arial,sans-serif;
  }
  .btn-row{display:flex; gap:8px;}
  .btn-row button{
    flex:1; font-family:"Helvetica Neue",Arial,sans-serif; font-size:14px;
    padding:11px 6px; border-radius:8px; border:none; cursor:pointer; color:#fff;
  }
  .btn-again{background:var(--red);}
  .btn-hard{background:var(--gold);}
  .btn-good{background:var(--green);}

  .choice{
    display:block; width:100%; text-align:left; background:var(--card);
    border:1px solid var(--line); border-radius:8px; padding:12px 14px; margin-bottom:8px;
    font-family:"Helvetica Neue",Arial,sans-serif; font-size:14px; cursor:pointer; color:var(--ink);
  }
  .choice.correct{background:#e4f1ea; border-color:var(--green);}
  .choice.wrong{background:#f6e3de; border-color:var(--red);}
  .choice .cw{font-weight:bold; color:var(--navy); font-family:Georgia,serif; font-size:16px;}
  .choice .cd{display:block; margin-top:4px; font-size:12px; color:var(--muted);}
  .q-word{font-size:22px; color:var(--navy); font-weight:bold; margin-bottom:4px;}
  .q-sub{font-family:"Helvetica Neue",Arial,sans-serif; font-size:12px; color:var(--muted); margin-bottom:12px;}
  .q-sent{font-size:15px; line-height:1.6; margin-bottom:14px;}
  .blank{border-bottom:2px solid var(--navy); padding:0 4px;}

  .empty{
    text-align:center; padding:40px 20px; color:var(--muted);
    font-family:"Helvetica Neue",Arial,sans-serif; font-size:14px;
  }
  .empty .big{font-size:40px; margin-bottom:10px;}

  footer.tip{
    font-family:"Helvetica Neue",Arial,sans-serif; font-size:12px; color:var(--muted);
    text-align:center; margin-top:18px;
  }
  .reset-link{

const TOTAL_DAYS = 25;
const DAY_MS = 24*60*60*1000;
const INTERVALS = [1,2,4,7,15,30]; // box 0..5 -> days until next review

// Deterministic seeded shuffle so word-to-day assignment is stable across
// sessions but NOT alphabetical - keeps daily study varied and unpredictable.
function mulberry32(seed){
  return function(){
    seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function seededShuffle(arr, seed){
  const rand = mulberry32(seed);
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(rand()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

const SHUFFLE_SEED = 20260705; // fixed seed -> same "random" order every load
const ORDERED_VOCAB = seededShuffle(VOCAB, SHUFFLE_SEED);
const PER_DAY = Math.ceil(ORDERED_VOCAB.length / TOTAL_DAYS);
ORDERED_VOCAB.forEach((v,i)=>{ v.id = 'w'+VOCAB.indexOf(v); v.day = Math.floor(i/PER_DAY)+1; });

let progress = {};      // id -> {box, next, seen, correct, wrong}
let startDate = null;   // ms timestamp of day 1
let todayIndex = 1;

function todayMs(){ const d=new Date(); d.setHours(0,0,0,0); return d.getTime(); }

async function loadState(){
  try{
    const v = localStorage.getItem('sv_start_date');
    startDate = v ? parseInt(v,10) : null;
  }catch(e){ startDate = null; }
  if(!startDate){
    startDate = todayMs();
    try{ localStorage.setItem('sv_start_date', String(startDate)); }catch(e){}
  }
  todayIndex = Math.min(TOTAL_DAYS, Math.floor((todayMs()-startDate)/DAY_MS)+1);

  try{
    const v = localStorage.getItem('sv_progress');
    progress = v ? JSON.parse(v) : {};
  }catch(e){ progress = {}; }
}

async function saveProgress(){
  try{ localStorage.setItem('sv_progress', JSON.stringify(progress)); }catch(e){}
  if(fbEnabled && currentUser){
    try{
      await db.collection('users').doc(currentUser.uid).set({
        progress: progress,
        startDate: startDate,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }, {merge:true});
      setSyncBadge(true);
    }catch(e){ console.warn('cloud save failed', e); setSyncBadge(false, true); }
  }
}

// ---------- Cloud account sync ----------
let currentUser = null;

function setSyncBadge(synced, error){
  const el = document.getElementById('syncBadge');
  if(!el) return;
  if(currentUser){
    el.className = 'sync-badge' + (synced ? ' synced' : '');
    el.textContent = error ? ('Signed in as ' + currentUser.email + ' ‚ÄĒ sync error, will retry')
                           : ('Signed in as ' + currentUser.email + (synced ? ' ‚ÄĒ synced' : ' ‚ÄĒ syncing‚Ä¶'));
  } else {
    el.className = 'sync-badge';
    el.textContent = 'Not signed in ‚ÄĒ progress is saved on this device only';
  }
}

async function pullCloudProgress(){
  if(!fbEnabled || !currentUser) return;
  try{
    const doc = await db.collection('users').doc(currentUser.uid).get();
    if(doc.exists){
      const data = doc.data();
      if(data.progress) progress = data.progress;
      if(data.startDate) startDate = data.startDate;
      todayIndex = Math.min(TOTAL_DAYS, Math.floor((todayMs()-startDate)/DAY_MS)+1);
      try{
        localStorage.setItem('sv_progress', JSON.stringify(progress));
        localStorage.setItem('sv_start_date', String(startDate));
      }catch(e){}
    } else {
      // first login on this account: push whatever is on this device up to the cloud
      await saveProgress();
    }
    setSyncBadge(true);
    renderAll();
  }catch(e){ console.warn('cloud pull failed', e); setSyncBadge(false, true); }
}

if(fbEnabled){
  auth.onAuthStateChanged(async (user)=>{
    currentUser = user;
    setSyncBadge(!!user);
    if(user){
      await pullCloudProgress();
    }
    renderAccountPanel();
  });
}

function renderAccountPanel(){
  const el = document.getElementById('panel-account');
  if(!el) return;
  if(!fbEnabled){
    el.innerHTML = `<div class="acct-box">
      <p>Account sync isn't set up for this copy of the app yet ‚ÄĒ it's running in on-device-only mode. See the setup guide to enable cross-device sync.</p>
    </div>`;
    return;
  }
  if(currentUser){
    el.innerHTML = `
      <div class="acct-box">
        <p>Signed in as <b>${currentUser.email}</b></p>
        <p style="color:var(--muted);font-size:12px;">Your progress syncs automatically across any device where you sign in with this account.</p>
        <button class="secondary" id="signOutBtn">Sign Out</button>
      </div>
    `;
    document.getElementById('signOutBtn').onclick = ()=> auth.signOut();
  } else {
    el.innerHTML = `
      <div class="acct-box">
        <div class="acct-msg" id="acctMsg"></div>
        <input type="email" id="acctEmail" placeholder="Email" autocomplete="email">
        <input type="password" id="acctPassword" placeholder="Password (6+ characters)" autocomplete="current-password">
        <button id="loginBtn">Log In</button>
        <button class="secondary" id="signupBtn">Create Account</button>
        <p style="color:var(--muted);font-size:12px;margin-top:8px;">Signing in lets your progress follow you to any phone, tablet, or computer. Without an account, progress just stays on this device.</p>
      </div>
    `;
    const msg = document.getElementById('acctMsg');
    document.getElementById('loginBtn').onclick = async ()=>{
      msg.textContent = '';
      const email = document.getElementById('acctEmail').value.trim();
      const pw = document.getElementById('acctPassword').value;
      try{
        await auth.signInWithEmailAndPassword(email, pw);
      }catch(e){ msg.textContent = e.message; }
    };
    document.getElementById('signupBtn').onclick = async ()=>{
      msg.textContent = '';
      const email = document.getElementById('acctEmail').value.trim();
      const pw = document.getElementById('acctPassword').value;
      try{
        await auth.createUserWithEmailAndPassword(email, pw);
      }catch(e){ msg.textContent = e.message; }
    };
  }
}

function getRecord(id){
  if(!progress[id]) progress[id] = {box:0, next:null, seen:0, correct:0, wrong:0};
  return progress[id];
}

function isIntroduced(v){ return v.day <= todayIndex; }
function isDue(v){
  const r = progress[v.id];
  if(!r || r.next===null) return false;
  return r.next <= todayIndex;
}
function isNewToday(v){
  const r = progress[v.id];
  return v.day === todayIndex && (!r || r.seen===0);
}
function isMastered(v){
  const r = progress[v.id];
  return r && r.box >= 5;
}

function markResult(v, quality){
  // quality: 0 = again/wrong, 1 = hard, 2 = good/correct
  const r = getRecord(v.id);
  r.seen++;
  if(quality===0){
    r.box = 0;
    r.wrong++;
  } else if(quality===1){
    r.box = Math.max(0, r.box);
    r.correct++;
  } else {
    r.box = Math.min(5, r.box+1);
    r.correct++;
  }
  r.next = todayIndex + INTERVALS[Math.min(r.box, INTERVALS.length-1)];
  saveProgress();
}

// ---------- Speech synthesis for American pronunciation ----------
let usVoice = null;
function pickVoice(){
  const voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
  usVoice = voices.find(v=>v.lang==='en-US') || voices.find(v=>v.lang && v.lang.startsWith('en')) || null;
}
if(window.speechSynthesis){
  pickVoice();
  window.speechSynthesis.onvoiceschanged = pickVoice;
}
function speakWord(word){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(word);
  u.lang = 'en-US';
  if(usVoice) u.voice = usVoice;
  u.rate = 0.9;
  window.speechSynthesis.speak(u);
}
function boldify(text){
  return text.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>');
}

function shuffle(arr){
  const a=arr.slice();
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

function updateStats(){
  const dueWords = ORDERED_VOCAB.filter(v=>isIntroduced(v) && isDue(v));
  const newWords = ORDERED_VOCAB.filter(v=>isNewToday(v));
  const masteredCount = ORDERED_VOCAB.filter(v=>isMastered(v)).length;
  document.getElementById('statNew').textContent = newWords.length;
  document.getElementById('statDue').textContent = dueWords.length;
  document.getElementById('statMastered').textContent = masteredCount;
  document.getElementById('dayBadge').textContent = 'Day ' + todayIndex + ' / ' + TOTAL_DAYS;
}

// ---------- Flashcard renderer (used by both review + learn tabs) ----------
function renderFlashcardQueue(containerId, words, emptyMsg){
  const el = document.getElementById(containerId);
  if(words.length===0){
    el.innerHTML = '<div class="empty"><div class="big">&#127881;</div>'+emptyMsg+'</div>';
    return;
  }
  let idx = 0;
  let flipped = false;

  function draw(){
    if(idx >= words.length){
      el.innerHTML = '<div class="empty"><div class="big">&#9989;</div>Nice work ‚ÄĒ this set is done. Check another tab.</div>';
      updateStats();
      return;
    }
    const v = words[idx];
    flipped = false;
    el.innerHTML = `
      <div class="card" id="fcCard">
        <div class="word">${v.w}</div>
        <div class="pos">${v.p}</div>
        <div class="pron-row">
          <span class="ipa">${v.ipa}</span>
          <button class="play-btn" id="playBtnFront" title="Play pronunciation">&#128266;</button>
        </div>
        <div class="hint">${idx+1} / ${words.length} &middot; tap card to flip</div>
      </div>
      <div class="btn-row" id="fcButtons" style="display:none;">
        <button class="btn-again">Didn't know it</button>
        <button class="btn-hard">Kind of fuzzy</button>
        <button class="btn-good">Knew it</button>
      </div>
    `;
    document.getElementById('fcCard').onclick = flip;
    document.getElementById('playBtnFront').onclick = (ev)=>{ ev.stopPropagation(); speakWord(v.w); };
    const btns = document.querySelectorAll('#fcButtons button');
    btns[0].onclick = ()=>answer(0);
    btns[1].onclick = ()=>answer(1);
    btns[2].onclick = ()=>answer(2);
  }
  function flip(){
    if(flipped) return;
    flipped = true;
    const v = words[idx];
    let examplesHtml = `<div class="ex"><span class="ex-label">Example</span>${v.e.replace('___', '<b>'+v.w+'</b>')}</div>`;
    if(v.e2){
      examplesHtml += `<div class="ex"><span class="ex-label">From your word list</span>${boldify(v.e2)}</div>`;
    }
    document.getElementById('fcCard').innerHTML = `
      <div class="word">${v.w}</div>
      <div class="pos">${v.p}</div>
      <div class="pron-row">
        <span class="ipa">${v.ipa}</span>
        <button class="play-btn" id="playBtnBack" title="Play pronunciation">&#128266;</button>
      </div>
      <div class="def">${v.d}</div>
      ${examplesHtml}
    `;
    document.getElementById('playBtnBack').onclick = (ev)=>{ ev.stopPropagation(); speakWord(v.w); };
    document.getElementById('fcButtons').style.display = 'flex';
  }
  function answer(q){
    markResult(words[idx], q);
    idx++;
    draw();
  }
  draw();

}

function renderReviewPanel(){
  const words = shuffle(ORDERED_VOCAB.filter(v=>isIntroduced(v) && isDue(v)));
  renderFlashcardQueue('panel-review', words, 'Nothing due for review right now ‚ÄĒ try the "New Words" tab.');
}
function renderLearnPanel(){
  const words = ORDERED_VOCAB.filter(v=>v.day===todayIndex);
  renderFlashcardQueue('panel-learn', words, "You've finished today's new words. Come back tomorrow!");
}

// ---------- Quiz (definition matching, all English) ----------
function renderQuizPanel(){
  const pool = shuffle(ORDERED_VOCAB.filter(v=>isIntroduced(v)));
  const el = document.getElementById('panel-quiz');
  if(pool.length < 4){
    el.innerHTML = '<div class="empty"><div class="big">&#128214;</div>Not enough words unlocked yet ‚ÄĒ learn a few more days first.</div>';
    return;
  }
  let idx = 0;
  const queue = pool.slice(0, Math.min(15, pool.length));

  function draw(){
    if(idx >= queue.length){
      el.innerHTML = '<div class="empty"><div class="big">&#9989;</div>Round complete! Switch tabs and come back for another round.</div>';
      updateStats();
      return;
    }
    const v = queue[idx];
    const wrongs = shuffle(pool.filter(x=>x.id!==v.id)).slice(0,3);
    const options = shuffle([v, ...wrongs]);
    el.innerHTML = `
      <div class="q-word">${v.w} <span style="font-size:13px;color:var(--gold);font-style:italic;">${v.p}</span></div>
      <div class="q-sub">Choose the correct definition (${idx+1}/${queue.length})</div>
      <div id="qOptions"></div>
    `;
    const opt = document.getElementById('qOptions');
    options.forEach(o=>{
      const b = document.createElement('div');
      b.className = 'choice';
      b.textContent = o.d;
      b.onclick = ()=>{
        const correct = o.id===v.id;
        b.classList.add(correct?'correct':'wrong');
        if(!correct){
          [...opt.children].forEach(c=>{ if(c.textContent===v.d) c.classList.add('correct'); });
        }
        markResult(v, correct?2:0);
        [...opt.children].forEach(c=>c.onclick=null);
        setTimeout(()=>{ idx++; draw(); }, 900);
      };
      opt.appendChild(b);
    });
  }
  draw();
}

// ---------- Fill in the blank: word-only options, reveal definition after click ----------
function renderFillPanel(){
  const pool = shuffle(ORDERED_VOCAB.filter(v=>isIntroduced(v)));
  const el = document.getElementById('panel-fill');
  if(pool.length < 4){
    el.innerHTML = '<div class="empty"><div class="big">&#128214;</div>Not enough words unlocked yet ‚ÄĒ learn a few more days first.</div>';
    return;
  }
  let idx = 0;
  const queue = pool.slice(0, Math.min(15, pool.length));

  function draw(){
    if(idx >= queue.length){
      el.innerHTML = '<div class="empty"><div class="big">&#9989;</div>Round complete! This is the closest practice to an SAT sentence-completion question.</div>';
      updateStats();
      return;
    }
    const v = queue[idx];
    const wrongs = shuffle(pool.filter(x=>x.id!==v.id)).slice(0,3);
    const options = shuffle([v, ...wrongs]);
    el.innerHTML = `
      <div class="q-sent">${v.e.replace('___', '<span class="blank">______</span>')}</div>
      <div class="q-sub">Pick the word that best fits the blank (${idx+1}/${queue.length})</div>
      <div id="fOptions"></div>
    `;
    const opt = document.getElementById('fOptions');
    options.forEach(o=>{
      const b = document.createElement('div');
      b.className = 'choice';
      b.innerHTML = '<span class="cw">'+o.w+'</span>';
      b.onclick = ()=>{
        const correct = o.id===v.id;
        b.classList.add(correct?'correct':'wrong');
        b.innerHTML = '<span class="cw">'+o.w+'</span><span class="cd">'+o.d+'</span>';
        if(!correct){
          [...opt.children].forEach(c=>{
            if(c.querySelector('.cw') && c.querySelector('.cw').textContent===v.w){
              c.classList.add('correct');
              c.innerHTML = '<span class="cw">'+v.w+'</span><span class="cd">'+v.d+'</span>';
            }
          });
        }
        markResult(v, correct?2:0);
        [...opt.children].forEach(c=>c.onclick=null);
        setTimeout(()=>{ idx++; draw(); }, 1300);
      };
      opt.appendChild(b);
    });
  }
  draw();
}

// ---------- Progress panel ----------
function renderProgressPanel(){
  const el = document.getElementById('panel-progress');
  const introduced = ORDERED_VOCAB.filter(isIntroduced);
  const mastered = introduced.filter(isMastered).length;
  const learning = introduced.filter(v=>{const r=progress[v.id]; return r && r.box>0 && r.box<5;}).length;
  const fresh = introduced.length - mastered - learning;
  const byDay = {};
  for(let d=1; d<=todayIndex; d++){
    const words = ORDERED_VOCAB.filter(v=>v.day===d);
    const done = words.filter(v=>progress[v.id] && progress[v.id].seen>0).length;
    byDay[d] = {total:words.length, done};
  }
  let rows = '';
  for(let d=todayIndex; d>=1; d--){
    const info = byDay[d];
    const pct = info.total ? Math.round(100*info.done/info.total) : 0;
    rows += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;font-family:'Helvetica Neue',Arial,sans-serif;font-size:12px;">
      <div style="width:52px;color:var(--muted)">Day ${d}</div>
      <div style="flex:1;background:#eee;border-radius:6px;height:8px;overflow:hidden;">
        <div style="width:${pct}%;background:var(--navy-2);height:8px;"></div>
      </div>
      <div style="width:60px;text-align:right;color:var(--muted)">${info.done}/${info.total}</div>
    </div>`;
  }
  el.innerHTML = `
    <div class="stat-row">
      <div class="stat"><b>${ORDERED_VOCAB.length}</b><span>Total Words</span></div>
      <div class="stat"><b>${introduced.length}</b><span>Unlocked</span></div>
      <div class="stat"><b>${mastered}</b><span>Mastered</span></div>
    </div>
    <div style="font-family:'Helvetica Neue',Arial,sans-serif;font-size:13px;color:var(--muted);margin-bottom:10px;">
      Learning: ${learning} &middot; Just started: ${fresh} &middot; Mastered (5+ correct in a row): ${mastered}
    </div>
    <div style="border-top:1px solid var(--line);padding-top:10px;">${rows}</div>
  `;
}

function renderAll(){
  updateStats();
  renderReviewPanel();
  renderLearnPanel();
  renderQuizPanel();
  renderFillPanel();
  renderProgressPanel();
  renderAccountPanel();
}

document.querySelectorAll('nav.tabs button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('nav.tabs button').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-'+btn.dataset.tab).classList.add('active');
    if(btn.dataset.tab==='quiz') renderQuizPanel();
    if(btn.dataset.tab==='fill') renderFillPanel();
    if(btn.dataset.tab==='progress') renderProgressPanel();
    if(btn.dataset.tab==='account') renderAccountPanel();
  });
});

document.getElementById('resetLink').addEventListener('click', async ()=>{
  if(!confirm('Reset all learning progress? This cannot be undone.')) return;
  progress = {};
  await saveProgress();
  startDate = todayMs();
  try{ localStorage.setItem('sv_start_date', String(startDate)); }catch(e){}
  todayIndex = 1;
  renderAll();
});

(async function init(){
  await loadState();
  renderAll();
})();
</script>
